  <text x="340" y="327" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">Adecco gZ — progettato per la Gen Z, non adattato</text>
  <text x="340" y="344" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.8)">● = ottimo  ◐ = parziale  ○ = assente / critico</text>

