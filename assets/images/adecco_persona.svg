<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 360" font-family="'Trebuchet MS', 'Segoe UI', Helvetica, sans-serif">

  <!-- Background -->
  <rect width="680" height="360" fill="#FFFFFF"/>

  <!-- ── LEFT PANEL — Rosso ── -->
  <rect x="0" y="0" width="340" height="360" rx="0" fill="#EC2227"/>

  <!-- Avatar placeholder -->
  <circle cx="170" cy="80" r="42" fill="rgba(255,255,255,0.15)"/>
  <circle cx="170" cy="64" r="16" fill="rgba(255,255,255,0.5)"/>
  <ellipse cx="170" cy="100" rx="24" ry="14" fill="rgba(255,255,255,0.35)"/>

  <!-- Name -->
  <text x="170" y="148" text-anchor="middle" font-size="22" font-weight="700" fill="#FFFFFF">Dani</text>
  <text x="170" y="168" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.7)">20 anni · Milano</text>

  <!-- Divider -->
  <line x1="32" y1="182" x2="308" y2="182" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

  <!-- Quote -->
  <text x="170" y="204" text-anchor="middle" font-size="10" fill="#FFFFFF" font-style="italic">"Voglio capire dove posso crescere,</text>
  <text x="170" y="220" text-anchor="middle" font-size="10" fill="#FFFFFF" font-style="italic">non solo trovare un lavoro."</text>

  <!-- Divider -->
  <line x1="32" y1="236" x2="308" y2="236" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>

  <!-- Tag pills -->
  <rect x="60" y="248" width="108" height="24" rx="12" fill="rgba(255,255,255,0.18)"/>
  <text x="114" y="264" text-anchor="middle" font-size="9" fill="#FFFFFF">Studente</text>

  <rect x="178" y="248" width="124" height="24" rx="12" fill="rgba(255,255,255,0.12)"/>
  <text x="240" y="264" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.85)">Prima esperienza</text>

  <!-- ── RIGHT PANEL — sfondo chiaro ── -->
  <rect x="340" y="0" width="340" height="360" fill="#FAFAFA"/>

  <!-- Section 1: Motivazioni -->
  <text x="364" y="30" font-size="10" font-weight="700" fill="#EC2227">Motivazioni</text>
  <line x1="364" y1="35" x2="648" y2="35" stroke="#EC2227" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="364" y="52" font-size="9" fill="#1A1A1A">· Orientamento chiaro</text>
  <text x="364" y="66" font-size="9" fill="#1A1A1A">· Percorso guidato</text>
  <text x="364" y="80" font-size="9" fill="#1A1A1A">· Contatto umano</text>

  <!-- Section 2: Frustrazioni -->
  <text x="364" y="108" font-size="10" font-weight="700" fill="#EC2227">Frustrazioni</text>
  <line x1="364" y1="113" x2="648" y2="113" stroke="#EC2227" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="364" y="130" font-size="9" fill="#1A1A1A">· Linguaggio formale</text>
  <text x="364" y="144" font-size="9" fill="#1A1A1A">· Processi impersonali</text>
  <text x="364" y="158" font-size="9" fill="#1A1A1A">· Non si sente rappresentata</text>

  <!-- Section 3: Digitale -->
  <text x="364" y="186" font-size="10" font-weight="700" fill="#EC2227">Digitale</text>
  <line x1="364" y1="191" x2="648" y2="191" stroke="#EC2227" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="364" y="208" font-size="9" fill="#1A1A1A">· TikTok · Instagram · LinkedIn</text>
  <text x="364" y="222" font-size="9" fill="#1A1A1A">· Contenuti brevi e visivi</text>

  <!-- Section 4: Obiettivi -->
  <text x="364" y="250" font-size="10" font-weight="700" fill="#EC2227">Obiettivi</text>
  <line x1="364" y1="255" x2="648" y2="255" stroke="#EC2227" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="364" y="272" font-size="9" fill="#1A1A1A">· Primo lavoro</text>
  <text x="364" y="286" font-size="9" fill="#1A1A1A">· Capire le aziende</text>
  <text x="364" y="300" font-size="9" fill="#1A1A1A">· Crescere professionalmente</text>

  <!-- Bottom label bar -->
  <rect x="340" y="330" width="340" height="30" fill="#EC2227"/>
  <text x="510" y="350" text-anchor="middle" font-size="9" font-weight="700" fill="#FFFFFF" letter-spacing="1">USER PERSONA — GEN Z</text>

</svg>
