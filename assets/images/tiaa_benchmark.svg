  <!-- Left panel -->
  <rect x="8" y="58" width="260" height="298" rx="10" fill="#EDECEA"/>
  <!-- Right panel -->
  <rect x="276" y="58" width="276" height="298" rx="10" fill="#132E55"/>

  <!-- Panel headers -->
  <text x="138" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#888">Job Board Tradizionale</text>
  <text x="414" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#C8F53E">There Is An Alternative</text>

  <!-- Header dividers -->
  <line x1="24" y1="92" x2="252" y2="92" stroke="#CCC" stroke-width="0.8" opacity="0.6"/>
  <line x1="292" y1="92" x2="536" y2="92" stroke="#FFF" stroke-width="0.8" opacity="0.15"/>

  <!-- Row 1 -->
  <text x="24" y="110" font-size="8" letter-spacing="2" fill="#BBB" font-weight="600">TIPO DI PIATTAFORMA</text>
