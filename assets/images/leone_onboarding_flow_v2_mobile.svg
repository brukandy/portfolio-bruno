<svg width="100%" viewBox="0 0 360 790" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="180" y="14" text-anchor="middle" font-family="'Trebuchet MS',Helvetica,sans-serif" font-size="10" opacity="0.35" fill="#0D1F3C">onboarding guidato — solo al primo accesso</text>

<!-- STEP 1 — Login / Registrazione -->
<rect x="16" y="22" width="328" height="70" rx="6" fill="#F4F7FD" stroke="#C5D5EE" stroke-width="0.5"/>
<text x="180" y="44" text-anchor="middle" dominant-baseline="central" font-family="'Trebuchet MS',Helvetica,sans-serif" font-size="15" font-weight="500" fill="#0D1F3C">Login / Registrazione</text>
<text x="180" y="64" text-anchor="middle" dominant-baseline="central" font-family="'Trebuchet MS',Helvetica,sans-serif" font-size="12" fill="#6B85A8">Punto di ingresso</text>
<text x="180" y="80" text-anchor="middle" dominant-baseline="central" font-family="'Trebuchet MS',Helvetica,sans-serif" font-size="11" opacity="0.5" fill="#0D1F3C">metrica: ↑ registrazioni</text>

<line x1="180" y1="92" x2="180" y2="110" stroke="#1E4A8C" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- STEP 2 — Video hero -->
<rect x="16" y="112" width="328" height="70" rx="6" fill="#132E55" stroke="#F6C243" stroke-width="0.5"/>
<text x="180" y="134" text-anchor="middle" dominant-baseline="central" font-family="'Trebuchet MS',Helvetica,sans-serif" font-size="15" font-weight="500" fill="#FFFFFF">Video hero</text>
<text x="180" y="154" text-anchor="middle" dominant-baseline="central" font-family="'Trebuchet MS',Helvetica,sans-serif" font-size="12" fill="#A0B8D8">Orienta l'utente  ·  ↓ incertezza iniziale</text>
<text x="180" y="170" text-anchor="middle" dominant-baseline="central" font-family="'Trebuchet MS',Helvetica,sans-serif" font-size="11" opacity="0.55" fill="#A0B8D8">metrica: ↑ comprensione</text>

<line x1="180" y1="182" x2="180" y2="200" stroke="#1E4A8C" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- STEP 3 — Test preferenze -->
<rect x="16" y="202" width="328" height="70" rx="6" fill="#132E55" stroke="#F6C243" stroke-width="0.5"/>
<text x="180" y="224" text-anchor="middle" dominant-baseline="central" font-family="'Trebuchet MS',Helvetica,sans-serif" font-size="15" font-weight="500" fill="#FFFFFF">Test preferenze</text>
<text x="180" y="244" text-anchor="middle" dominant-baseline="central" font-family="'Trebuchet MS',Helvetica,sans-serif" font-size="12" fill="#A0B8D8">Raccolta preferenze · attivazione utente</text>
<text x="180" y="260" text-anchor="middle" dominant-baseline="central" font-family="'Trebuchet MS',Helvetica,sans-serif" font-size="11" opacity="0.55" fill="#A0B8D8">metrica: ↓ drop-off</text>

<line x1="180" y1="272" x2="180" y2="290" stroke="#1E4A8C" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- STEP 4 — Corsi gratuiti assegnati -->
<rect x="16" y="292" width="328" height="70" rx="6" fill="#132E55" stroke="#F6C243" stroke-width="1"/>
<text x="180" y="314" text-anchor="middle" dominant-baseline="central" font-family="'Trebuchet MS',Helvetica,sans-serif" font-size="15" font-weight="500" fill="#FFFFFF">Corsi gratuiti assegnati</text>
<text x="180" y="334" text-anchor="middle" dominant-baseline="central" font-family="'Trebuchet MS',Helvetica,sans-serif" font-size="12" fill="#A0B8D8">Percorso su misura · nurturing mirato</text>
<text x="180" y="350" text-anchor="middle" dominant-baseline="central" font-family="'Trebuchet MS',Helvetica,sans-serif" font-size="11" opacity="0.55" fill="#A0B8D8">metrica: ↑ first interaction</text>

<line x1="180" y1="362" x2="180" y2="380" stroke="#1E4A8C" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- STEP 5 — Home personalizzata -->
<rect x="16" y="382" width="328" height="70" rx="6" fill="#132E55" stroke="#1E4A8C" stroke-width="0.5"/>
<text x="180" y="404" text-anchor="middle" dominant-baseline="central" font-family="'Trebuchet MS',Helvetica,sans-serif" font-size="15" font-weight="500" fill="#A0B8D8">Home personalizzata</text>
<text x="180" y="424" text-anchor="middle" dominant-baseline="central" font-family="'Trebuchet MS',Helvetica,sans-serif" font-size="12" fill="#A0B8D8">Continuità · esperienza su misura</text>
<text x="180" y="440" text-anchor="middle" dominant-baseline="central" font-family="'Trebuchet MS',Helvetica,sans-serif" font-size="11" opacity="0.55" fill="#A0B8D8">metrica: ↑ retention</text>

<!-- INSIGHT BOX -->
<rect x="16" y="470" width="328" height="60" rx="8" fill="#132E55" stroke="#1E4A8C" stroke-width="0.5"/>
<text x="180" y="492" text-anchor="middle" dominant-baseline="central" font-family="'Trebuchet MS',Helvetica,sans-serif" font-size="13" font-weight="500" fill="#A0B8D8">L'onboarding è il primo momento</text>
<text x="180" y="512" text-anchor="middle" dominant-baseline="central" font-family="'Trebuchet MS',Helvetica,sans-serif" font-size="13" font-weight="500" fill="#A0B8D8">di personalizzazione</text>

<!-- CONFRONTO -->
<text x="180" y="552" text-anchor="middle" font-family="'Trebuchet MS',Helvetica,sans-serif" font-size="10" opacity="0.28" fill="#0D1F3C">onboarding normale vs leone master school</text>

<rect x="16" y="560" width="155" height="88" rx="6" fill="#F4F7FD" stroke="#C5D5EE" stroke-width="0.5"/>
<text x="93" y="580" text-anchor="middle" dominant-baseline="central" font-family="'Trebuchet MS',Helvetica,sans-serif" font-size="13" font-weight="500" fill="#0D1F3C">Normale</text>
<text x="93" y="598" text-anchor="middle" dominant-baseline="central" font-family="'Trebuchet MS',Helvetica,sans-serif" font-size="11" fill="#6B85A8">Tutorial → fine</text>
<text x="93" y="614" text-anchor="middle" dominant-baseline="central" font-family="'Trebuchet MS',Helvetica,sans-serif" font-size="11" fill="#6B85A8">Utente lasciato solo</text>
<text x="93" y="630" text-anchor="middle" dominant-baseline="central" font-family="'Trebuchet MS',Helvetica,sans-serif" font-size="11" fill="#6B85A8">Nessuna personaliz.</text>

<text x="180" y="604" text-anchor="middle" font-family="'Trebuchet MS',Helvetica,sans-serif" font-size="13" opacity="0.35" fill="#0D1F3C">vs</text>

<rect x="189" y="560" width="155" height="88" rx="6" fill="#132E55" stroke="#F6C243" stroke-width="1"/>
<text x="266" y="580" text-anchor="middle" dominant-baseline="central" font-family="'Trebuchet MS',Helvetica,sans-serif" font-size="13" font-weight="500" fill="#FFFFFF">Leone Master</text>
<text x="266" y="598" text-anchor="middle" dominant-baseline="central" font-family="'Trebuchet MS',Helvetica,sans-serif" font-size="11" fill="#A0B8D8">Percorso assegnato</text>
<text x="266" y="614" text-anchor="middle" dominant-baseline="central" font-family="'Trebuchet MS',Helvetica,sans-serif" font-size="11" fill="#A0B8D8">Contenuti su misura</text>
<text x="266" y="630" text-anchor="middle" dominant-baseline="central" font-family="'Trebuchet MS',Helvetica,sans-serif" font-size="11" fill="#A0B8D8">Retention dal giorno 1</text>

</svg>
