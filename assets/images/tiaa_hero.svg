<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="system-ui,-apple-system,'Helvetica Neue',sans-serif">
  <!-- Background -->
  <rect width="1600" height="900" fill="#1A1A1A"/>

  <!-- Nav bar -->
  <rect width="1600" height="58" fill="#111111"/>
  <rect x="56" y="17" width="20" height="20" rx="3" fill="#C8F53E"/>
  <text x="84" y="33" font-size="13" font-weight="700" fill="#FFF">tia</text>
  <text x="200" y="34" font-size="13" fill="#666">Home</text>
  <text x="280" y="34" font-size="13" fill="#666">Trova un lavoro</text>
  <text x="420" y="34" font-size="13" fill="#666">Trova un'azienda</text>
  <text x="560" y="34" font-size="13" fill="#666">Media</text>
  <rect x="1380" y="15" width="130" height="28" rx="5" fill="none" stroke="#444" stroke-width="1"/>
  <text x="1445" y="34" text-anchor="middle" font-size="11" fill="#777">Accesso aziende</text>
  <rect x="1522" y="15" width="60" height="28" rx="5" fill="#FFF"/>
  <text x="1552" y="34" text-anchor="middle" font-size="11" font-weight="700" fill="#111">Talenti</text>

  <!-- Decorative circles (TIA brand style) -->
  <circle cx="100" cy="480" r="200" fill="none" stroke="#2A2A2A" stroke-width="1.5"/>
  <circle cx="100" cy="480" r="140" fill="none" stroke="#252525" stroke-width="1"/>
  <circle cx="1500" cy="420" r="260" fill="none" stroke="#2A2A2A" stroke-width="1.5"/>
  <circle cx="1500" cy="420" r="180" fill="none" stroke="#252525" stroke-width="1"/>

  <!-- Hero headline -->
  <text x="800" y="280" text-anchor="middle" font-size="58" font-weight="700" fill="#FFF">Scopri cosa c'è</text>
  <rect x="700" y="290" width="200" height="58" rx="30" fill="none" stroke="#C8F53E" stroke-width="2"/>
  <text x="800" y="340" text-anchor="middle" font-size="58" font-weight="700" fill="#C8F53E">veramente</text>
  <text x="800" y="340" text-anchor="middle" font-size="58" font-weight="700" fill="#FFF">         dietro le aziende</text>
  <text x="800" y="410" text-anchor="middle" font-size="58" font-weight="700" fill="#FFF">e scegli il tuo nuovo posto di lavoro</text>

  <!-- Search bar -->
  <rect x="280" y="445" width="1040" height="60" rx="8" fill="#FFF"/>
  <text x="320" y="481" font-size="15" fill="#AAA">Cerca un lavoro, nome azienda, parola chiave</text>
  <rect x="1262" y="453" width="44" height="44" rx="5" fill="#132E55"/>
  <text x="1284" y="482" text-anchor="middle" font-size="20" fill="#FFF">&#x2315;</text>

  <text x="800" y="540" text-anchor="middle" font-size="13" fill="#666">oppure</text>
  <text x="852" y="540" text-anchor="middle" font-size="13" font-weight="600" fill="#999">vedi tutti gli annunci di lavoro</text>

  <!-- Yellow band -->
  <rect x="0" y="610" width="1600" height="290" fill="#C8F53E"/>
  <text x="800" y="680" text-anchor="middle" font-size="24" font-weight="700" fill="#111">Spoiler: il lavoro dei tuoi sogni non arriva da solo.</text>
  <text x="800" y="716" text-anchor="middle" font-size="15" fill="#333">Incomincia dal primo passo: crea ora il tuo profilo TIA.</text>
  <rect x="650" y="744" width="300" height="50" rx="7" fill="#111"/>
  <text x="800" y="776" text-anchor="middle" font-size="15" font-weight="600" fill="#FFF">Crea il tuo profilo</text>
</svg>
